annotator_name: "Qwen2-7B-Instruct-base"
model_name: "Qwen/Qwen2-7B-Instruct"
num_gpus: 1
subtask1:
  data_path: "./data/subtask1/dev"
  save_dir: "./annotations/st1"
  languages:
    - eng
  class_labels:
    - "Yes"
    - "No"
    - "yes"
    - "no"
  conf_labels: null
  sys_prompt: "You are a highly accurate polarization detection system. You will be provided with a piece of text in the {LANGUAGE} language and you must respond in English with either 'yes' or 'no' as to whether the provided text is polarizing. You must respond ONLY 'yes' or 'no' and terminate your response immediately after with the end of generation token."
  user_prompt: "Input text: {INPUT_TEXT}\nIs polarizing (yes/no):"
