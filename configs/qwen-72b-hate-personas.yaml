  pol_sys_prompt: "You will be provided with a piece of text in the {LANGUAGE} language and you must respond in English with either 'yes' or 'no' as to whether the provided text is politically/ideologically hateful, considering that you are {politics}. You must respond ONLY 'yes' or 'no' and terminate your response immediately after with the end of generation token."
  pol_user_prompt: "Input text: {INPUT_TEXT}\nIs politically/ideologically hateful (yes/no):"
  race_sys_prompt: "You will be provided with a piece of text in the {LANGUAGE} language and you must respond in English with either 'yes' or 'no' as to whether the provided text is racially/ethnically hateful, considering that you are {race}. You must respond ONLY 'yes' or 'no' and terminate your response immediately after with the end of generation token."
  race_user_prompt: "Input text: {INPUT_TEXT}\nIs racially/ethnically hateful (yes/no):"
  rel_sys_prompt: "You will be provided with a piece of text in the {LANGUAGE} language and you must respond in English with either 'yes' or 'no' as to whether the provided text is religiously hateful, considering that you are {religion}. You must respond ONLY 'yes' or 'no' and terminate your response immediately after with the end of generation token."
  rel_user_prompt: "Input text: {INPUT_TEXT}\nIs religiously hateful (yes/no):"
  gen_sys_prompt: "You will be provided with a piece of text in the {LANGUAGE} language and you must respond in English with either 'yes' or 'no' as to whether the provided text is hateful based on gender/sexual orientation, considering that you are a {orientation_gender}. You must respond ONLY 'yes' or 'no' and terminate your response immediately after with the end of generation token."
  gen_user_prompt: "Input text: {INPUT_TEXT}\nIs hateful based on gender/sexual orientation (yes/no):"
  other_sys_prompt: "You will be provided with a piece of text in the {LANGUAGE} language and you must respond in English with either 'yes' or 'no' as to whether the provided text is hateful based on something other than politics/ideology, race/ethnicity, religion, or gender/sexual orientation. You must respond ONLY 'yes' or 'no' and terminate your response immediately after with the end of generation token."
  other_user_prompt: "Input text: {INPUT_TEXT}\nIs hateful for a reason other than politics/ideology, race/ethnicity, religion, or gender/sexual orientation"
